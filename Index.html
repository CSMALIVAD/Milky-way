<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Milky Way Galaxy Simulation</title>

<style>
html, body {
    margin: 0;
    overflow: hidden;
    background: black;
    width: 100%;
    height: 100%;
    font-family: Arial, sans-serif;
}

canvas {
    display: block;
}

#info {
    position: absolute;
    top: 10px;
    left: 10px;
    color: white;
    z-index: 10;
    background: rgba(0,0,0,0.5);
    padding: 10px;
    border-radius: 10px;
    font-size: 14px;
}
</style>
</head>

<body>

<div id="info">
<b>Milky Way Simulation</b><br>
Drag = Rotate<br>
Scroll/Pinch = Zoom<br>
Center = Sagittarius A* Black Hole
</div>

<script type="module">

import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js';
import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.160/examples/jsm/controls/OrbitControls.js';

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x000000, 0.0007);

const camera = new THREE.PerspectiveCamera(
    75,
    window.innerWidth / window.innerHeight,
    0.1,
    5000
);

camera.position.set(0, 150, 400);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.minDistance = 50;
controls.maxDistance = 2000;

// Ambient light
const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambientLight);

// Galaxy stars
const galaxyGeometry = new THREE.BufferGeometry();
const starCount = 150000;

const positions = new Float32Array(starCount * 3);
const colors = new Float32Array(starCount * 3);

const color = new THREE.Color();

for (let i = 0; i < starCount; i++) {

    const i3 = i * 3;

    const radius = Math.random() * 800;
    const branchAngle = (i % 4) * (Math.PI * 2 / 4);

    const spinAngle = radius * 0.015;

    const randomX = (Math.random() - 0.5) * 30;
    const randomY = (Math.random() - 0.5) * 8;
    const randomZ = (Math.random() - 0.5) * 30;

    positions[i3] = Math.cos(branchAngle + spinAngle) * radius + randomX;
    positions[i3 + 1] = randomY;
    positions[i3 + 2] = Math.sin(branchAngle + spinAngle) * radius + randomZ;

    const mixedColor = radius < 300 ? '#ffffff' : '#88aaff';

    color.set(mixedColor);

    colors[i3] = color.r;
    colors[i3 + 1] = color.g;
    colors[i3 + 2] = color.b;
}

galaxyGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
galaxyGeometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

const galaxyMaterial = new THREE.PointsMaterial({
    size: 1.2,
    vertexColors: true,
    depthWrite: false,
    blending: THREE.AdditiveBlending,
    transparent: true
});

const galaxy = new THREE.Points(galaxyGeometry, galaxyMaterial);
scene.add(galaxy);

// Central Black Hole
const blackHoleGeometry = new THREE.SphereGeometry(12, 64, 64);
const blackHoleMaterial = new THREE.MeshBasicMaterial({
    color: 0x000000
});

const blackHole = new THREE.Mesh(blackHoleGeometry, blackHoleMaterial);
scene.add(blackHole);

// Accretion disk
const diskGeometry = new THREE.TorusGeometry(20, 4, 32, 100);
const diskMaterial = new THREE.MeshBasicMaterial({
    color: 0xff8800,
    wireframe: true
});

const disk = new THREE.Mesh(diskGeometry, diskMaterial);
disk.rotation.x = Math.PI / 2;
scene.add(disk);

// Background stars
const bgGeometry = new THREE.BufferGeometry();
const bgCount = 5000;
const bgPositions = new Float32Array(bgCount * 3);

for (let i = 0; i < bgCount * 3; i++) {
    bgPositions[i] = (Math.random() - 0.5) * 4000;
}

bgGeometry.setAttribute('position', new THREE.BufferAttribute(bgPositions, 3));

const bgMaterial = new THREE.PointsMaterial({
    color: 0xffffff,
    size: 2
});

const backgroundStars = new THREE.Points(bgGeometry, bgMaterial);
scene.add(backgroundStars);

// Animation loop
function animate() {
    requestAnimationFrame(animate);

    galaxy.rotation.y += 0.0005;
    disk.rotation.z += 0.01;

    controls.update();

    renderer.render(scene, camera);
}

animate();

// Resize support
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>

</body>
</html>
