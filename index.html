<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
/>

<title>Ultra Realistic Milky Way</title>

<style>

body{
    margin:0;
    overflow:hidden;
    background:black;
    font-family:Arial, sans-serif;
}

canvas{
    display:block;
}

#info{
    position:absolute;
    top:10px;
    left:10px;
    z-index:10;

    color:white;

    background:rgba(0,0,0,0.45);

    padding:16px;

    border-radius:12px;

    line-height:1.7;

    backdrop-filter:blur(4px);

    width:330px;
}

#title{
    font-size:22px;
    color:#ffd27f;
    margin-bottom:10px;
}

.highlight{
    color:#7fdcff;
}

</style>

</head>

<body>

<div id="info">

<div id="title">
ULTRA REALISTIC MILKY WAY
</div>

<div class="highlight">
Physics Features
</div>

• Galactic Bulge<br>
• Thin Disk + Thick Disk<br>
• Spiral Arms<br>
• Sagittarius A* Black Hole<br>
• Differential Rotation<br>
• Orion Arm Sun Position<br>
• Star Population Colors<br>
• Dust Lanes<br>
• Halo Stars<br>
• Realistic Galactic Motion<br><br>

Mouse Drag = Rotate<br>
Scroll = Zoom

</div>


<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>

// ======================================================
// SCENE
// ======================================================

const scene = new THREE.Scene();

scene.fog =
new THREE.FogExp2(
0x000000,
0.00016
);


// ======================================================
// CAMERA
// ======================================================

const camera =
new THREE.PerspectiveCamera(
70,
window.innerWidth/window.innerHeight,
0.1,
30000
);

camera.position.set(
0,
450,
1600
);


// ======================================================
// RENDERER
// ======================================================

const renderer =
new THREE.WebGLRenderer({
    antialias:true
});

renderer.setSize(
window.innerWidth,
window.innerHeight
);

renderer.setPixelRatio(
window.devicePixelRatio
);

renderer.outputEncoding =
THREE.sRGBEncoding;

document.body.appendChild(
renderer.domElement
);


// ======================================================
// CONTROLS
// ======================================================

const controls =
new THREE.OrbitControls(
camera,
renderer.domElement
);

controls.enableDamping = true;

controls.dampingFactor = 0.05;

controls.minDistance = 100;

controls.maxDistance = 7000;


// ======================================================
// LIGHTING
// ======================================================

scene.add(
new THREE.AmbientLight(
0xffffff,
0.45
));

const centerLight =
new THREE.PointLight(
0xffcc88,
3,
5000
);

scene.add(centerLight);


// ======================================================
// GALAXY GROUP
// ======================================================

const galaxyGroup =
new THREE.Group();

scene.add(galaxyGroup);


// ======================================================
// GALAXY PARAMETERS
// ======================================================

const STAR_COUNT = 250000;

const galaxyRadius = 2200;

const spiralArms = 4;

const positions =
new Float32Array(
STAR_COUNT*3
);

const colors =
new Float32Array(
STAR_COUNT*3
);

const sizes =
new Float32Array(
STAR_COUNT
);

const starData = [];

const geometry =
new THREE.BufferGeometry();


// ======================================================
// COLORS
// ======================================================

const white =
new THREE.Color(1,1,1);

const blue =
new THREE.Color(0.6,0.8,1);

const yellow =
new THREE.Color(1,0.9,0.7);

const orange =
new THREE.Color(1,0.7,0.45);

const red =
new THREE.Color(1,0.45,0.35);


// ======================================================
// CREATE STARS
// ======================================================

for(let i=0;i<STAR_COUNT;i++){

    const i3 = i*3;

    // radial distribution
    const radius =
    Math.pow(
    Math.random(),
    0.55
    ) * galaxyRadius;

    // spiral arm
    const arm =
    (i%spiralArms)
    * (Math.PI*2/spiralArms);

    // logarithmic spiral
    const spin =
    radius * 0.0105;

    const angle =
    arm + spin;

    // disk thickness
    const diskHeight =
    (1-radius/galaxyRadius);

    // dust lane effect
    const dust =
    Math.random()<0.18
    ? 0.35
    : 1;

    // thin disk + thick disk
    const y =
    Math.pow(
    (Math.random()-0.5),
    3
    ) * 160 * diskHeight;

    // spiral structure
    const x =
    Math.cos(angle)
    * radius
    + (Math.random()-0.5)
    * 55
    * dust;

    const z =
    Math.sin(angle)
    * radius
    + (Math.random()-0.5)
    * 55
    * dust;

    positions[i3] = x;
    positions[i3+1] = y;
    positions[i3+2] = z;

    // ==================================================
    // REALISTIC STELLAR POPULATIONS
    // ==================================================

    let starColor;

    // bulge population
    if(radius < 260){

        const t =
        Math.random();

        if(t<0.65){

            starColor = yellow;

        }else{

            starColor = orange;
        }

    }

    // spiral arm blue stars
    else if(Math.random()>0.97){

        starColor = blue;

    }

    // red dwarfs
    else if(Math.random()>0.82){

        starColor = red;

    }

    // normal disk stars
    else{

        starColor = white;
    }

    colors[i3] =
    starColor.r;

    colors[i3+1] =
    starColor.g;

    colors[i3+2] =
    starColor.b;

    sizes[i] =
    Math.random()*2;

    // ==================================================
    // DIFFERENTIAL ROTATION
    // ==================================================

    let speed;

    // inner bulge faster
    if(radius < 350){

        speed =
        0.0018;

    }

    // flat rotation curve
    else{

        speed =
        0.00038;
    }

    starData.push({

        radius:radius,
        angle:Math.atan2(z,x),
        y:y,
        speed:speed

    });

}


// ======================================================
// GEOMETRY
// ======================================================

geometry.setAttribute(
'position',
new THREE.BufferAttribute(
positions,
3
));

geometry.setAttribute(
'color',
new THREE.BufferAttribute(
colors,
3
));


// ======================================================
// STAR MATERIAL
// ======================================================

const material =
new THREE.PointsMaterial({

    size:2.1,

    vertexColors:true,

    transparent:true,

    opacity:0.95,

    depthWrite:false,

    blending:
    THREE.AdditiveBlending

});


// ======================================================
// GALAXY
// ======================================================

const galaxy =
new THREE.Points(
geometry,
material
);

galaxyGroup.add(galaxy);


// ======================================================
// GALACTIC HALO
// ======================================================

const haloGeometry =
new THREE.BufferGeometry();

const HALO_STARS = 30000;

const haloPositions =
new Float32Array(
HALO_STARS*3
);

for(let i=0;i<HALO_STARS;i++){

    const i3=i*3;

    const r =
    2500 +
    Math.random()*2500;

    const theta =
    Math.random()*Math.PI*2;

    const phi =
    Math.acos(
    2*Math.random()-1
    );

    haloPositions[i3] =
    r*Math.sin(phi)
    *Math.cos(theta);

    haloPositions[i3+1] =
    r*Math.cos(phi);

    haloPositions[i3+2] =
    r*Math.sin(phi)
    *Math.sin(theta);

}

haloGeometry.setAttribute(
'position',
new THREE.BufferAttribute(
haloPositions,
3
));

const halo =
new THREE.Points(

haloGeometry,

new THREE.PointsMaterial({

    color:0xaaccff,

    size:1.5,

    transparent:true,

    opacity:0.25

})

);

galaxyGroup.add(halo);


// ======================================================
// SAGITTARIUS A*
// ======================================================

const blackHole =
new THREE.Mesh(

new THREE.SphereGeometry(
24,
64,
64
),

new THREE.MeshBasicMaterial({
    color:0x000000
})

);

galaxyGroup.add(blackHole);


// ======================================================
// ACCRETION DISK
// ======================================================

const ring =
new THREE.Mesh(

new THREE.TorusGeometry(
60,
7,
32,
200
),

new THREE.MeshBasicMaterial({

    color:0xffaa44,

    wireframe:true

})

);

ring.rotation.x =
Math.PI/2;

galaxyGroup.add(ring);


// ======================================================
// SUN POSITION
// ORION ARM
// ======================================================

const sun =
new THREE.Mesh(

new THREE.SphereGeometry(
7,
16,
16
),

new THREE.MeshBasicMaterial({
    color:0xffffaa
})

);

sun.position.set(
820,
12,
0
);

galaxyGroup.add(sun);


// ======================================================
// SUN ORBIT RING
// ======================================================

const orbitRing =
new THREE.Mesh(

new THREE.RingGeometry(
16,
18,
64
),

new THREE.MeshBasicMaterial({

    color:0x00ffff,

    side:THREE.DoubleSide

})

);

orbitRing.rotation.x =
Math.PI/2;

orbitRing.position.copy(
sun.position
);

galaxyGroup.add(orbitRing);


// ======================================================
// BACKGROUND STARS
// ======================================================

const bgGeometry =
new THREE.BufferGeometry();

const bgCount = 40000;

const bgPositions =
new Float32Array(
bgCount*3
);

for(let i=0;i<bgCount*3;i++){

    bgPositions[i] =
    (Math.random()-0.5)
    * 120000;
}

bgGeometry.setAttribute(
'position',
new THREE.BufferAttribute(
bgPositions,
3
));

const backgroundStars =
new THREE.Points(

bgGeometry,

new THREE.PointsMaterial({

    color:0xffffff,

    size:2

})

);

scene.add(backgroundStars);


// ======================================================
// MOTION
// ======================================================

function updateGalaxy(){

    const pos =
    geometry.attributes.position.array;

    for(let i=0;i<STAR_COUNT;i++){

        const i3=i*3;

        const star =
        starData[i];

        // differential rotation
        star.angle +=
        star.speed;

        const radius =
        star.radius;

        // spiral persistence
        const spiralTwist =
        radius * 0.0105;

        pos[i3] =
        Math.cos(
        star.angle + spiralTwist
        )
        * radius;

        pos[i3+1] =
        star.y;

        pos[i3+2] =
        Math.sin(
        star.angle + spiralTwist
        )
        * radius;
    }

    geometry.attributes.position
    .needsUpdate = true;

}


// ======================================================
// ANIMATION
// ======================================================

function animate(){

    requestAnimationFrame(
    animate
    );

    updateGalaxy();

    // slow whole galaxy motion
    galaxyGroup.rotation.y +=
    0.00005;

    // black hole disk
    ring.rotation.z +=
    0.012;

    controls.update();

    renderer.render(
    scene,
    camera
    );

}

animate();


// ======================================================
// RESIZE
// ======================================================

window.addEventListener(
'resize',
()=>{

camera.aspect =
window.innerWidth/window.innerHeight;

camera.updateProjectionMatrix();

renderer.setSize(
window.innerWidth,
window.innerHeight
);

});

</script>

</body>
</html>
