<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Realistic Milky Way Universe Simulation</title>

<style>

body{
    margin:0;
    overflow:hidden;
    background:black;
    font-family:Arial, sans-serif;
}

canvas{
    display:block;
}

#info{
    position:absolute;
    top:10px;
    left:10px;
    color:white;
    background:rgba(0,0,0,0.45);
    padding:14px;
    border-radius:12px;
    z-index:10;
    line-height:1.6;
    backdrop-filter:blur(5px);
}

#info b{
    color:#ffd27f;
}

</style>
</head>

<body>

<div id="info">
<b>REALISTIC MILKY WAY SIMULATION</b><br><br>

• Spiral Arms = Density Waves<br>
• Sun Position = Orion Arm (~27,000 ly from center)<br>
• Central Supermassive Black Hole = Sagittarius A*<br>
• 1000 External Galaxies<br>
• Dynamic Orbital Motion<br>
• Real Galactic Rotation Feel<br><br>

Mouse Drag = Rotate<br>
Scroll = Zoom
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>

// ============================================
// BASIC SETUP
// ============================================

const scene = new THREE.Scene();

scene.fog = new THREE.FogExp2(0x000000,0.00022);

const camera = new THREE.PerspectiveCamera(
    75,
    window.innerWidth/window.innerHeight,
    0.1,
    20000
);

camera.position.set(0,250,700);

const renderer = new THREE.WebGLRenderer({
    antialias:true
});

renderer.setSize(window.innerWidth,window.innerHeight);

renderer.setPixelRatio(window.devicePixelRatio);

renderer.outputEncoding = THREE.sRGBEncoding;

document.body.appendChild(renderer.domElement);


// ============================================
// CONTROLS
// ============================================

const controls = new THREE.OrbitControls(
    camera,
    renderer.domElement
);

controls.enableDamping = true;
controls.dampingFactor = 0.05;

controls.minDistance = 100;
controls.maxDistance = 4000;


// ============================================
// LIGHTING
// ============================================

const ambient = new THREE.AmbientLight(0xffffff,0.4);
scene.add(ambient);

const centerGlow = new THREE.PointLight(
    0xffcc88,
    4,
    3000
);

scene.add(centerGlow);


// ============================================
// MILKY WAY PARAMETERS
// ============================================

const galaxyGroup = new THREE.Group();
scene.add(galaxyGroup);

const starCount = 180000;

const positions = new Float32Array(starCount*3);
const colors = new Float32Array(starCount*3);
const sizes = new Float32Array(starCount);

const geometry = new THREE.BufferGeometry();

const spiralArms = 4;

const galaxyRadius = 1400;

const starData = [];


// ============================================
// STAR COLORS
// ============================================

const colorCore = new THREE.Color(0xffddaa);
const colorDisk = new THREE.Color(0xffffff);
const colorBlue = new THREE.Color(0xaaccff);


// ============================================
// CREATE MILKY WAY
// ============================================

for(let i=0;i<starCount;i++){

    const i3 = i*3;

    // radial distribution
    const radius =
        Math.pow(Math.random(),0.55)
        * galaxyRadius;

    // spiral structure
    const arm =
        (i % spiralArms)
        * (Math.PI*2/spiralArms);

    const spin = radius * 0.008;

    const angle = arm + spin;

    // density noise
    const randomX =
        (Math.random()-0.5)
        * (40 - radius*0.01);

    const randomY =
        Math.pow((Math.random()-0.5),3)
        * 120;

    const randomZ =
        (Math.random()-0.5)
        * (40 - radius*0.01);

    const x =
        Math.cos(angle)*radius + randomX;

    const y =
        randomY;

    const z =
        Math.sin(angle)*radius + randomZ;

    positions[i3] = x;
    positions[i3+1] = y;
    positions[i3+2] = z;

    // realistic star coloring
    let mixedColor;

    if(radius < 180){

        mixedColor = colorCore.clone();

    }else if(Math.random() > 0.92){

        mixedColor = colorBlue.clone();

    }else{

        mixedColor = colorDisk.clone();
    }

    colors[i3] = mixedColor.r;
    colors[i3+1] = mixedColor.g;
    colors[i3+2] = mixedColor.b;

    sizes[i] = Math.random()*2;

    // store orbital data
    starData.push({
        radius:radius,
        angle:Math.atan2(z,x),
        y:y,
        speed:0.00004 + (1/radius)*0.03
    });

}


// ============================================
// GEOMETRY
// ============================================

geometry.setAttribute(
    'position',
    new THREE.BufferAttribute(positions,3)
);

geometry.setAttribute(
    'color',
    new THREE.BufferAttribute(colors,3)
);


// ============================================
// STAR MATERIAL
// ============================================

const material = new THREE.PointsMaterial({
    size:2.2,
    vertexColors:true,
    transparent:true,
    opacity:0.95,
    depthWrite:false,
    blending:THREE.AdditiveBlending
});

const galaxy = new THREE.Points(
    geometry,
    material
);

galaxyGroup.add(galaxy);


// ============================================
// GALACTIC CORE
// ============================================

const coreGeometry =
new THREE.SphereGeometry(18,64,64);

const coreMaterial =
new THREE.MeshBasicMaterial({
    color:0x000000
});

const blackHole =
new THREE.Mesh(
    coreGeometry,
    coreMaterial
);

galaxyGroup.add(blackHole);


// ============================================
// ACCRETION DISK
// ============================================

const ringGeometry =
new THREE.TorusGeometry(
    40,
    6,
    32,
    200
);

const ringMaterial =
new THREE.MeshBasicMaterial({
    color:0xffaa33,
    wireframe:true
});

const ring =
new THREE.Mesh(
    ringGeometry,
    ringMaterial
);

ring.rotation.x = Math.PI/2;

galaxyGroup.add(ring);


// ============================================
// SUN LOCATION
// Real location approximation
// ============================================

const sunGeometry =
new THREE.SphereGeometry(5,16,16);

const sunMaterial =
new THREE.MeshBasicMaterial({
    color:0xffff66
});

const sun =
new THREE.Mesh(
    sunGeometry,
    sunMaterial
);

// Sun ~27,000 light years equivalent scaled
sun.position.set(520,10,0);

galaxyGroup.add(sun);


// ============================================
// ORION ARM MARKER
// ============================================

const orbitGeometry =
new THREE.RingGeometry(12,13,32);

const orbitMaterial =
new THREE.MeshBasicMaterial({
    color:0x00ffff,
    side:THREE.DoubleSide
});

const orbitRing =
new THREE.Mesh(
    orbitGeometry,
    orbitMaterial
);

orbitRing.rotation.x = Math.PI/2;

orbitRing.position.copy(sun.position);

galaxyGroup.add(orbitRing);


// ============================================
// 1000 DISTANT GALAXIES
// ============================================

const universeGroup = new THREE.Group();
scene.add(universeGroup);

for(let i=0;i<1000;i++){

    const gGeometry =
    new THREE.BufferGeometry();

    const gStars = 80;

    const gPos =
    new Float32Array(gStars*3);

    for(let j=0;j<gStars;j++){

        const r =
        Math.random()*18;

        const a =
        Math.random()*Math.PI*2;

        const h =
        (Math.random()-0.5)*4;

        gPos[j*3] =
        Math.cos(a)*r;

        gPos[j*3+1] =
        h;

        gPos[j*3+2] =
        Math.sin(a)*r;
    }

    gGeometry.setAttribute(
        'position',
        new THREE.BufferAttribute(gPos,3)
    );

    const gMaterial =
    new THREE.PointsMaterial({
        color:
        new THREE.Color(
            0.6 + Math.random()*0.4,
            0.6 + Math.random()*0.4,
            1
        ),
        size:1.5
    });

    const miniGalaxy =
    new THREE.Points(
        gGeometry,
        gMaterial
    );

    // distributed through universe
    const dist =
    3000 + Math.random()*12000;

    const theta =
    Math.random()*Math.PI*2;

    const phi =
    Math.acos(
        2*Math.random()-1
    );

    miniGalaxy.position.set(
        dist*Math.sin(phi)*Math.cos(theta),
        dist*Math.cos(phi),
        dist*Math.sin(phi)*Math.sin(theta)
    );

    miniGalaxy.rotation.x =
    Math.random()*Math.PI;

    miniGalaxy.rotation.y =
    Math.random()*Math.PI;

    miniGalaxy.userData.rotationSpeed =
    0.0002 + Math.random()*0.001;

    universeGroup.add(miniGalaxy);
}


// ============================================
// BACKGROUND COSMIC STARS
// ============================================

const bgGeometry =
new THREE.BufferGeometry();

const bgCount = 12000;

const bgPositions =
new Float32Array(bgCount*3);

for(let i=0;i<bgCount*3;i++){

    bgPositions[i] =
    (Math.random()-0.5)*30000;
}

bgGeometry.setAttribute(
    'position',
    new THREE.BufferAttribute(bgPositions,3)
);

const bgMaterial =
new THREE.PointsMaterial({
    color:0xffffff,
    size:2
});

const backgroundStars =
new THREE.Points(
    bgGeometry,
    bgMaterial
);

scene.add(backgroundStars);


// ============================================
// REALISTIC ORBIT MOTION
// ============================================

function updateGalaxyMotion(){

    const pos =
    geometry.attributes.position.array;

    for(let i=0;i<starCount;i++){

        const i3 = i*3;

        const star = starData[i];

        star.angle += star.speed;

        const radius = star.radius;

        // differential rotation
        pos[i3] =
        Math.cos(star.angle)*radius;

        pos[i3+1] =
        star.y;

        pos[i3+2] =
        Math.sin(star.angle)*radius;
    }

    geometry.attributes.position.needsUpdate = true;
}


// ============================================
// ANIMATION LOOP
// ============================================

function animate(){

    requestAnimationFrame(animate);

    updateGalaxyMotion();

    ring.rotation.z += 0.02;

    // rotate external galaxies
    universeGroup.children.forEach(g=>{

        g.rotation.y +=
        g.userData.rotationSpeed;
    });

    // subtle galaxy tilt motion
    galaxyGroup.rotation.y += 0.00015;

    controls.update();

    renderer.render(scene,camera);
}

animate();


// ============================================
// RESIZE
// ============================================

window.addEventListener(
'resize',
()=>{

    camera.aspect =
    window.innerWidth/window.innerHeight;

    camera.updateProjectionMatrix();

    renderer.setSize(
        window.innerWidth,
        window.innerHeight
    );

});

</script>

</body>
</html>
