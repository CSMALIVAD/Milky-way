<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Milky Way Simulation</title>

<style>

body{
    margin:0;
    overflow:hidden;
    background:black;
    font-family:Arial;
}

canvas{
    display:block;
}

#info{
    position:absolute;
    top:10px;
    left:10px;
    color:white;
    background:rgba(0,0,0,0.5);
    padding:10px;
    border-radius:10px;
    z-index:10;
}

</style>
</head>

<body>

<div id="info">
Milky Way Galaxy<br>
Drag = Rotate<br>
Pinch/Scroll = Zoom
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>

// Scene
const scene = new THREE.Scene();


// Camera
const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
5000
);

camera.position.set(0,120,350);


// Renderer
const renderer = new THREE.WebGLRenderer({
    antialias:true
});

renderer.setSize(
window.innerWidth,
window.innerHeight
);

renderer.setPixelRatio(window.devicePixelRatio);

document.body.appendChild(renderer.domElement);


// Controls
const controls =
new THREE.OrbitControls(
camera,
renderer.domElement
);

controls.enableDamping = true;


// Galaxy stars
const galaxyGeometry =
new THREE.BufferGeometry();

const starCount = 50000;

const positions =
new Float32Array(starCount*3);

for(let i=0;i<starCount;i++){

    const i3 = i*3;

    const radius =
    Math.random()*700;

    const spin =
    radius*0.02;

    const branch =
    (i%4)*(Math.PI*2/4);

    const randomX =
    (Math.random()-0.5)*25;

    const randomY =
    (Math.random()-0.5)*8;

    const randomZ =
    (Math.random()-0.5)*25;

    positions[i3] =
    Math.cos(branch+spin)
    *radius
    +randomX;

    positions[i3+1] =
    randomY;

    positions[i3+2] =
    Math.sin(branch+spin)
    *radius
    +randomZ;
}

galaxyGeometry.setAttribute(
'position',
new THREE.BufferAttribute(
positions,
3
)
);


// Star material
const galaxyMaterial =
new THREE.PointsMaterial({
    color:0xffffff,
    size:1,
    transparent:true
});


// Galaxy object
const galaxy =
new THREE.Points(
galaxyGeometry,
galaxyMaterial
);

scene.add(galaxy);


// Black hole
const blackHoleGeometry =
new THREE.SphereGeometry(
10,
32,
32
);

const blackHoleMaterial =
new THREE.MeshBasicMaterial({
    color:0x000000
});

const blackHole =
new THREE.Mesh(
blackHoleGeometry,
blackHoleMaterial
);

scene.add(blackHole);


// Accretion ring
const ringGeometry =
new THREE.TorusGeometry(
20,
3,
16,
100
);

const ringMaterial =
new THREE.MeshBasicMaterial({
    color:0xff8800,
    wireframe:true
});

const ring =
new THREE.Mesh(
ringGeometry,
ringMaterial
);

ring.rotation.x = Math.PI/2;

scene.add(ring);


// Background stars
const bgGeometry =
new THREE.BufferGeometry();

const bgCount = 2000;

const bgPositions =
new Float32Array(bgCount*3);

for(let i=0;i<bgCount*3;i++){

    bgPositions[i] =
    (Math.random()-0.5)*4000;
}

bgGeometry.setAttribute(
'position',
new THREE.BufferAttribute(
bgPositions,
3
)
);

const bgMaterial =
new THREE.PointsMaterial({
    color:0xffffff,
    size:2
});

const backgroundStars =
new THREE.Points(
bgGeometry,
bgMaterial
);

scene.add(backgroundStars);


// Animation
function animate(){

    requestAnimationFrame(animate);

    galaxy.rotation.y += 0.0005;

    ring.rotation.z += 0.01;

    controls.update();

    renderer.render(scene,camera);
}

animate();


// Resize support
window.addEventListener(
'resize',
()=>{

camera.aspect =
window.innerWidth/window.innerHeight;

camera.updateProjectionMatrix();

renderer.setSize(
window.innerWidth,
window.innerHeight
);

});

</script>

</body>
</html>
