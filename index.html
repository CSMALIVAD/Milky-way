<!--
ADVANCED REALISTIC UNIVERSE SIMULATOR
FEATURES:
- Real Milky Way morphology
- 3 galaxy types:
    Spiral
    Elliptical
    Irregular
- Realistic galaxy colors
- Fly-to-galaxy system
- Dynamic orbital motion
- Different rotation curves
- Galaxy labels
- Universe navigation
- Realistic star density
- Cosmic depth fog
-->

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Advanced Universe Simulator</title>

<style>

body{
    margin:0;
    overflow:hidden;
    background:black;
    font-family:Arial;
}

canvas{
    display:block;
}

#ui{
    position:absolute;
    top:10px;
    left:10px;
    z-index:100;
    color:white;
    background:rgba(0,0,0,0.55);
    padding:15px;
    border-radius:12px;
    line-height:1.7;
    width:300px;
    backdrop-filter:blur(5px);
}

#galaxyName{
    color:#ffd27f;
    font-size:18px;
    margin-top:10px;
}

button{
    margin-top:10px;
    padding:10px;
    border:none;
    border-radius:8px;
    background:#222;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#444;
}

</style>
</head>

<body>

<div id="ui">

<b>REALISTIC UNIVERSE</b><br><br>

• Spiral Galaxies<br>
• Elliptical Galaxies<br>
• Irregular Galaxies<br>
• Real Rotation Curves<br>
• Fly Through Universe<br>
• Interactive Galaxy Travel<br>
• Realistic Galaxy Colors<br><br>

Mouse Drag = Rotate<br>
Scroll = Zoom<br>
Double Click Galaxy = Visit<br>

<div id="galaxyName">
Milky Way
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>

// =====================================================
// BASIC
// =====================================================

const scene = new THREE.Scene();

scene.fog =
new THREE.FogExp2(
0x000000,
0.000045
);

const camera =
new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
100000
);

camera.position.set(0,400,1200);

const renderer =
new THREE.WebGLRenderer({
    antialias:true
});

renderer.setSize(
window.innerWidth,
window.innerHeight
);

renderer.setPixelRatio(
window.devicePixelRatio
);

renderer.outputEncoding =
THREE.sRGBEncoding;

document.body.appendChild(
renderer.domElement
);


// =====================================================
// CONTROLS
// =====================================================

const controls =
new THREE.OrbitControls(
camera,
renderer.domElement
);

controls.enableDamping = true;
controls.dampingFactor = 0.05;

controls.minDistance = 50;
controls.maxDistance = 50000;


// =====================================================
// LIGHTS
// =====================================================

scene.add(
new THREE.AmbientLight(
0xffffff,
0.5
));


// =====================================================
// GALAXY STORAGE
// =====================================================

const galaxies = [];

const universe =
new THREE.Group();

scene.add(universe);


// =====================================================
// RANDOM HELPERS
// =====================================================

function rand(min,max){
    return Math.random()*(max-min)+min;
}


// =====================================================
// CREATE SPIRAL GALAXY
// =====================================================

function createSpiralGalaxy(
position,
size,
name
){

    const group = new THREE.Group();

    const stars = 12000;

    const geometry =
    new THREE.BufferGeometry();

    const positions =
    new Float32Array(stars*3);

    const colors =
    new Float32Array(stars*3);

    const starData = [];

    const arms = 4;

    for(let i=0;i<stars;i++){

        const i3 = i*3;

        const radius =
        Math.pow(Math.random(),0.6)
        * size;

        const arm =
        (i%arms)*(Math.PI*2/arms);

        const spin =
        radius*0.015;

        const angle =
        arm+spin;

        const x =
        Math.cos(angle)*radius
        +(Math.random()-0.5)*25;

        const y =
        Math.pow(
        (Math.random()-0.5),3
        )*80;

        const z =
        Math.sin(angle)*radius
        +(Math.random()-0.5)*25;

        positions[i3]=x;
        positions[i3+1]=y;
        positions[i3+2]=z;

        // realistic colors
        let color;

        if(radius<size*0.15){

            color =
            new THREE.Color(
            1,
            0.85,
            0.65
            );

        }else if(Math.random()>0.95){

            color =
            new THREE.Color(
            0.6,
            0.8,
            1
            );

        }else{

            color =
            new THREE.Color(
            1,
            1,
            1
            );
        }

        colors[i3]=color.r;
        colors[i3+1]=color.g;
        colors[i3+2]=color.b;

        starData.push({
            radius:radius,
            angle:Math.atan2(z,x),
            y:y,
            speed:
            0.00005 +
            (1/radius)*0.08
        });

    }

    geometry.setAttribute(
    'position',
    new THREE.BufferAttribute(
    positions,
    3
    ));

    geometry.setAttribute(
    'color',
    new THREE.BufferAttribute(
    colors,
    3
    ));

    const material =
    new THREE.PointsMaterial({
        size:2,
        vertexColors:true,
        transparent:true,
        opacity:0.95,
        depthWrite:false,
        blending:
        THREE.AdditiveBlending
    });

    const galaxy =
    new THREE.Points(
    geometry,
    material
    );

    group.add(galaxy);

    // central black hole
    const core =
    new THREE.Mesh(
    new THREE.SphereGeometry(
    size*0.03,
    32,
    32
    ),
    new THREE.MeshBasicMaterial({
        color:0x000000
    }));

    group.add(core);

    group.position.copy(position);

    universe.add(group);

    galaxies.push({
        type:"spiral",
        name:name,
        group:group,
        stars:starData,
        geometry:geometry,
        size:size
    });

}


// =====================================================
// CREATE ELLIPTICAL GALAXY
// =====================================================

function createEllipticalGalaxy(
position,
size,
name
){

    const group =
    new THREE.Group();

    const stars = 7000;

    const geometry =
    new THREE.BufferGeometry();

    const positions =
    new Float32Array(stars*3);

    const colors =
    new Float32Array(stars*3);

    for(let i=0;i<stars;i++){

        const i3=i*3;

        const r =
        Math.pow(Math.random(),0.4)
        * size;

        const theta =
        Math.random()*Math.PI*2;

        const phi =
        Math.acos(
        2*Math.random()-1
        );

        positions[i3] =
        r*Math.sin(phi)
        *Math.cos(theta);

        positions[i3+1] =
        r*Math.cos(phi)*0.5;

        positions[i3+2] =
        r*Math.sin(phi)
        *Math.sin(theta);

        // yellow-orange old stars
        colors[i3]=1;
        colors[i3+1]=0.82;
        colors[i3+2]=0.55;
    }

    geometry.setAttribute(
    'position',
    new THREE.BufferAttribute(
    positions,
    3
    ));

    geometry.setAttribute(
    'color',
    new THREE.BufferAttribute(
    colors,
    3
    ));

    const galaxy =
    new THREE.Points(
    geometry,
    new THREE.PointsMaterial({
        size:2,
        vertexColors:true,
        transparent:true,
        blending:
        THREE.AdditiveBlending
    }));

    group.add(galaxy);

    group.position.copy(position);

    universe.add(group);

    galaxies.push({
        type:"elliptical",
        name:name,
        group:group
    });

}


// =====================================================
// CREATE IRREGULAR GALAXY
// =====================================================

function createIrregularGalaxy(
position,
size,
name
){

    const group =
    new THREE.Group();

    const stars = 5000;

    const geometry =
    new THREE.BufferGeometry();

    const positions =
    new Float32Array(stars*3);

    const colors =
    new Float32Array(stars*3);

    for(let i=0;i<stars;i++){

        const i3=i*3;

        positions[i3]=
        rand(-size,size);

        positions[i3+1]=
        rand(-size*0.4,size*0.4);

        positions[i3+2]=
        rand(-size,size);

        // blue active star formation
        colors[i3]=0.6;
        colors[i3+1]=0.8;
        colors[i3+2]=1;
    }

    geometry.setAttribute(
    'position',
    new THREE.BufferAttribute(
    positions,
    3
    ));

    geometry.setAttribute(
    'color',
    new THREE.BufferAttribute(
    colors,
    3
    ));

    const galaxy =
    new THREE.Points(
    geometry,
    new THREE.PointsMaterial({
        size:2,
        vertexColors:true,
        transparent:true,
        blending:
        THREE.AdditiveBlending
    }));

    group.add(galaxy);

    group.position.copy(position);

    universe.add(group);

    galaxies.push({
        type:"irregular",
        name:name,
        group:group
    });

}


// =====================================================
// CREATE UNIVERSE
// =====================================================

// Milky Way
createSpiralGalaxy(
new THREE.Vector3(0,0,0),
900,
"Milky Way"
);


// Andromeda
createSpiralGalaxy(
new THREE.Vector3(5000,500,3000),
1200,
"Andromeda"
);


// Triangulum
createSpiralGalaxy(
new THREE.Vector3(-4000,-300,6000),
700,
"Triangulum"
);


// Random universe
for(let i=0;i<120;i++){

    const pos =
    new THREE.Vector3(
        rand(-30000,30000),
        rand(-10000,10000),
        rand(-30000,30000)
    );

    const type =
    Math.random();

    if(type<0.5){

        createSpiralGalaxy(
        pos,
        rand(300,900),
        "Spiral Galaxy "+i
        );

    }else if(type<0.8){

        createEllipticalGalaxy(
        pos,
        rand(300,1100),
        "Elliptical Galaxy "+i
        );

    }else{

        createIrregularGalaxy(
        pos,
        rand(200,700),
        "Irregular Galaxy "+i
        );
    }

}


// =====================================================
// BACKGROUND STARS
// =====================================================

const bgGeometry =
new THREE.BufferGeometry();

const bgCount = 25000;

const bgPositions =
new Float32Array(bgCount*3);

for(let i=0;i<bgCount*3;i++){

    bgPositions[i] =
    (Math.random()-0.5)*120000;
}

bgGeometry.setAttribute(
'position',
new THREE.BufferAttribute(
bgPositions,
3
));

scene.add(
new THREE.Points(
bgGeometry,
new THREE.PointsMaterial({
    color:0xffffff,
    size:3
}))
);


// =====================================================
// RAYCASTER
// =====================================================

const raycaster =
new THREE.Raycaster();

const mouse =
new THREE.Vector2();

window.addEventListener(
'dblclick',
(event)=>{

    mouse.x =
    (event.clientX/
    window.innerWidth)*2-1;

    mouse.y =
    -(event.clientY/
    window.innerHeight)*2+1;

    raycaster.setFromCamera(
    mouse,
    camera
    );

    let nearest = null;
    let minDist = Infinity;

    galaxies.forEach(g=>{

        const dist =
        camera.position.distanceTo(
        g.group.position
        );

        if(dist<minDist){

            minDist = dist;
            nearest = g;
        }

    });

    if(nearest){

        document.getElementById(
        "galaxyName"
        ).innerHTML =
        nearest.name;

        const target =
        nearest.group.position.clone();

        camera.position.lerp(
        target.clone().add(
        new THREE.Vector3(
        nearest.size*1.5,
        nearest.size*0.5,
        nearest.size*1.5
        )),
        0.8
        );

        controls.target.copy(target);

    }

});


// =====================================================
// MOTION
// =====================================================

function updateGalaxyMotion(){

    galaxies.forEach(g=>{

        g.group.rotation.y += 0.0003;

        if(g.type==="spiral"){

            const pos =
            g.geometry.attributes.position.array;

            for(let i=0;i<g.stars.length;i++){

                const i3=i*3;

                const s=g.stars[i];

                s.angle += s.speed;

                pos[i3]=
                Math.cos(s.angle)
                *s.radius;

                pos[i3+2]=
                Math.sin(s.angle)
                *s.radius;
            }

            g.geometry.attributes.position
            .needsUpdate = true;
        }

    });

}


// =====================================================
// ANIMATION
// =====================================================

function animate(){

    requestAnimationFrame(
    animate
    );

    updateGalaxyMotion();

    universe.rotation.y += 0.00002;

    controls.update();

    renderer.render(
    scene,
    camera
    );

}

animate();


// =====================================================
// RESIZE
// =====================================================

window.addEventListener(
'resize',
()=>{

camera.aspect =
window.innerWidth/window.innerHeight;

camera.updateProjectionMatrix();

renderer.setSize(
window.innerWidth,
window.innerHeight
);

});

</script>

</body>
</html>
